apiVersion: hive/v1
kind: Agent
metadata:
  id: alerter
  team: monitor
spec:
  tier: native
  runtime:
    type: custom
    command: "./entrypoint.sh"
  capabilities:
    - name: send-alert
      description: "Send an alert notification with configurable severity and delivery channel."
      inputs:
        - name: message
          type: string
          description: "Alert message to send"
        - name: severity
          type: string
          description: "Alert severity: info, warning, or critical"
          required: false
        - name: channel
          type: string
          description: "Delivery channel: log or webhook"
          required: false
      outputs:
        - name: delivered
          type: bool
          description: "True if the alert was delivered successfully"
        - name: channel
          type: string
          description: "The channel used for delivery"
        - name: timestamp
          type: string
          description: "ISO 8601 timestamp of when the alert was sent"
