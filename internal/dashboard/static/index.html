<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        .app { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 1rem 0;
            flex-shrink: 0;
        }
        .sidebar-brand {
            padding: 0.5rem 1.25rem 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }
        .sidebar-brand span { color: var(--text-secondary); font-weight: 400; font-size: 0.75rem; margin-left: 0.5rem; }
        .nav-item {
            display: block;
            padding: 0.6rem 1.25rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.15s;
        }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { color: var(--accent); background: rgba(59,130,246,0.1); border-right: 2px solid var(--accent); }
        .main { flex: 1; overflow-y: auto; }
        .header {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .ws-status { font-size: 0.75rem; display: flex; align-items: center; gap: 0.4rem; }
        .ws-dot { width: 8px; height: 8px; border-radius: 50%; }
        .ws-dot.connected { background: var(--success); }
        .ws-dot.disconnected { background: var(--danger); }
        .content { padding: 2rem; }
        .grid { display: grid; gap: 1rem; }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
        }
        .card-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .card-value { font-size: 1.75rem; font-weight: 700; }
        .card-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.6rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 0.05em; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-running { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-stopped { background: rgba(100,116,139,0.2); color: var(--text-muted); }
        .badge-failed { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-online { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-offline { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-draining { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-cordoned { background: rgba(245,158,11,0.15); color: var(--warning); }
        .section-title { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
        .section-title:first-child { margin-top: 0; }
        .log-container {
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .log-line { color: var(--text-secondary); white-space: pre-wrap; word-break: break-all; }
        .log-line .ts { color: var(--text-muted); }
        .log-line .level-info { color: var(--accent); }
        .log-line .level-warn { color: var(--warning); }
        .log-line .level-error { color: var(--danger); }
        .chat-container { display: flex; flex-direction: column; height: 400px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
        .chat-input-row { display: flex; }
        .chat-input {
            flex: 1; padding: 0.75rem; background: var(--bg-secondary); border: 1px solid var(--border);
            border-top: none; color: var(--text-primary); font-size: 0.875rem; outline: none;
            border-radius: 0 0 0 var(--radius);
        }
        .chat-input:focus { border-color: var(--accent); }
        .chat-send {
            padding: 0.75rem 1.25rem; background: var(--accent); color: white; border: none;
            cursor: pointer; font-weight: 600; font-size: 0.875rem;
            border-radius: 0 0 var(--radius) 0;
        }
        .chat-send:hover { background: var(--accent-hover); }
        .chat-msg { margin-bottom: 0.75rem; }
        .chat-msg.user { text-align: right; }
        .chat-msg .bubble {
            display: inline-block; padding: 0.5rem 0.75rem; border-radius: var(--radius);
            max-width: 80%; text-align: left; font-size: 0.875rem;
        }
        .chat-msg.user .bubble { background: var(--accent); color: white; }
        .chat-msg.agent .bubble { background: var(--bg-tertiary); color: var(--text-primary); }
        .cap-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .cap-tag { background: var(--bg-tertiary); padding: 0.25rem 0.6rem; border-radius: var(--radius); font-size: 0.8rem; color: var(--text-secondary); }
        .flow-container { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; min-height: 300px; position: relative; }
        .flow-node { position: absolute; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.75rem; font-size: 0.8rem; cursor: default; }
        .flow-node .name { font-weight: 600; }
        .flow-node .status { font-size: 0.7rem; color: var(--text-muted); }
        svg.flow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .flow-svg line { stroke: var(--border); stroke-width: 1.5; }
        .flow-svg line.active { stroke: var(--accent); stroke-width: 2; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .btn { padding: 0.4rem 0.8rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; font-size: 0.8rem; }
        .btn:hover { background: var(--bg-secondary); }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 0.4rem 1rem; font-size: 0.875rem; }
        .detail-label { color: var(--text-muted); }
        .detail-value { color: var(--text-primary); }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .tab { padding: 0.5rem 1rem; cursor: pointer; color: var(--text-secondary); font-size: 0.875rem; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    </style>
</head>
<body>
<div class="app" id="app">
    <nav class="sidebar">
        <div class="sidebar-brand">Hive <span>Dashboard</span></div>
        <a class="nav-item active" data-view="overview">Cluster Overview</a>
        <a class="nav-item" data-view="nodes">Nodes</a>
        <a class="nav-item" data-view="agents">Agents</a>
        <a class="nav-item" data-view="capabilities">Capabilities</a>
        <a class="nav-item" data-view="flow">Message Flow</a>
        <a class="nav-item" data-view="logs">Logs</a>
    </nav>
    <div class="main">
        <div class="header">
            <h1 id="page-title">Cluster Overview</h1>
            <div class="ws-status">
                <div class="ws-dot disconnected" id="ws-dot"></div>
                <span id="ws-label">Disconnected</span>
            </div>
        </div>
        <div class="content" id="content"></div>
    </div>
</div>

<script>
(function() {
    "use strict";

    // --- State ---
    let state = {
        view: "overview",
        agents: [],
        nodes: [],
        capabilities: {},
        cluster: {},
        logs: [],
        messages: [],  // for flow visualization
        selectedAgent: null,
        chatMessages: [],
        wsConnected: false
    };

    let ws = null;
    let wsReconnectDelay = 1000;  // Start at 1s, doubles up to 30s
    const wsMaxReconnectDelay = 30000;
    let logFollowCancel = null;

    // --- API ---
    const api = {
        async get(path) {
            const r = await fetch("/api" + path);
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        },
        async post(path, body) {
            const r = await fetch("/api" + path, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        }
    };

    async function refresh() {
        try {
            const [cluster, agents, nodes, caps] = await Promise.all([
                api.get("/cluster"),
                api.get("/agents"),
                api.get("/nodes"),
                api.get("/capabilities")
            ]);
            state.cluster = cluster || {};
            state.agents = agents || [];
            state.nodes = nodes || [];
            state.capabilities = caps || {};
            render();
        } catch(e) {
            console.error("refresh failed:", e);
        }
    }

    // --- WebSocket ---
    function connectWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(proto + "//" + location.host + "/ws");

        ws.onopen = () => {
            state.wsConnected = true;
            wsReconnectDelay = 1000;  // Reset backoff on successful connection
            updateWSStatus();
        };

        ws.onclose = () => {
            state.wsConnected = false;
            updateWSStatus();
            setTimeout(connectWS, wsReconnectDelay);
            wsReconnectDelay = Math.min(wsReconnectDelay * 2, wsMaxReconnectDelay);
        };

        ws.onmessage = (evt) => {
            try {
                const msg = JSON.parse(evt.data);
                handleWSMessage(msg);
            } catch(e) {}
        };
    }

    function updateWSStatus() {
        const dot = document.getElementById("ws-dot");
        const label = document.getElementById("ws-label");
        if (state.wsConnected) {
            dot.className = "ws-dot connected";
            label.textContent = "Connected";
        } else {
            dot.className = "ws-dot disconnected";
            label.textContent = "Disconnected";
        }
    }

    function handleWSMessage(msg) {
        switch (msg.type) {
            case "agent_state_change":
                const a = state.agents.find(x => x.id === msg.data.agent_id);
                if (a) { a.status = msg.data.new_status; }
                if (state.view === "overview" || state.view === "agents") render();
                break;
            case "heartbeat":
                break;
            case "log_entry":
                if (state.view === "logs") {
                    state.logs.push(msg.data);
                    if (state.logs.length > 1000) state.logs.shift();
                    renderLogEntry(msg.data);
                }
                state.messages.push({from: msg.data.agent_id, type: "log", ts: Date.now()});
                break;
            case "node_state_change":
                const n = state.nodes.find(x => x.id === msg.data.node_id);
                if (n) { n.status = msg.data.status; }
                if (state.view === "overview" || state.view === "nodes") render();
                break;
        }
    }

    // --- Rendering ---
    function render() {
        const content = document.getElementById("content");
        const title = document.getElementById("page-title");

        switch(state.view) {
            case "overview":
                title.textContent = "Cluster Overview";
                content.innerHTML = renderOverview();
                break;
            case "nodes":
                title.textContent = "Nodes";
                content.innerHTML = renderNodes();
                break;
            case "agents":
                title.textContent = "Agents";
                content.innerHTML = renderAgents();
                break;
            case "agent-detail":
                title.textContent = "Agent: " + (state.selectedAgent || "");
                content.innerHTML = renderAgentDetail();
                setupChat();
                break;
            case "capabilities":
                title.textContent = "Capabilities";
                content.innerHTML = renderCapabilities();
                break;
            case "flow":
                title.textContent = "Message Flow";
                content.innerHTML = renderFlow();
                drawFlow();
                break;
            case "logs":
                title.textContent = "Logs";
                content.innerHTML = renderLogs();
                break;
        }
    }

    function statusBadge(status) {
        const s = (status || "").toLowerCase();
        let cls = "badge-pending";
        if (s === "running" || s === "online") cls = "badge-running";
        else if (s === "stopped") cls = "badge-stopped";
        else if (s === "failed") cls = "badge-failed";
        else if (s === "offline") cls = "badge-offline";
        else if (s === "draining") cls = "badge-draining";
        else if (s === "cordoned") cls = "badge-cordoned";
        else if (s === "online") cls = "badge-online";
        return '<span class="badge ' + cls + '">' + esc(status) + '</span>';
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

    // --- Views ---
    function renderOverview() {
        const running = state.agents.filter(a => a.status === "RUNNING").length;
        const onlineNodes = state.nodes.filter(n => n.status === "online").length;
        const totalCaps = state.capabilities.agents ? Object.keys(state.capabilities.agents).length : 0;

        return `
            <div class="grid grid-4">
                <div class="card">
                    <div class="card-title">Total Agents</div>
                    <div class="card-value">${state.agents.length}</div>
                    <div class="card-subtitle">${running} running</div>
                </div>
                <div class="card">
                    <div class="card-title">Nodes</div>
                    <div class="card-value">${state.nodes.length}</div>
                    <div class="card-subtitle">${onlineNodes} online</div>
                </div>
                <div class="card">
                    <div class="card-title">Capabilities</div>
                    <div class="card-value">${totalCaps}</div>
                </div>
                <div class="card">
                    <div class="card-title">Cluster</div>
                    <div class="card-value" style="font-size:1rem">${esc(state.cluster.name || "—")}</div>
                    <div class="card-subtitle">${esc(state.cluster.uptime || "")}</div>
                </div>
            </div>

            <div class="section-title">Agents</div>
            <div class="card" style="padding:0;overflow:hidden">
                <table>
                    <thead><tr><th>ID</th><th>Team</th><th>Status</th><th>Node</th><th>Restarts</th></tr></thead>
                    <tbody>
                    ${state.agents.map(a => `
                        <tr style="cursor:pointer" onclick="window.__selectAgent('${esc(a.id)}')">
                            <td>${esc(a.id)}</td>
                            <td>${esc(a.team)}</td>
                            <td>${statusBadge(a.status)}</td>
                            <td>${esc(a.node_id || "—")}</td>
                            <td>${a.restart_count || 0}</td>
                        </tr>
                    `).join("")}
                    ${state.agents.length === 0 ? '<tr><td colspan="5" class="empty-state">No agents</td></tr>' : ""}
                    </tbody>
                </table>
            </div>

            <div class="section-title">Nodes</div>
            <div class="card" style="padding:0;overflow:hidden">
                <table>
                    <thead><tr><th>ID</th><th>Tier</th><th>Arch</th><th>Status</th><th>Agents</th></tr></thead>
                    <tbody>
                    ${state.nodes.map(n => `
                        <tr>
                            <td>${esc(n.id)}</td>
                            <td>${n.tier || "—"}</td>
                            <td>${esc(n.arch || "—")}</td>
                            <td>${statusBadge(n.status)}</td>
                            <td>${(n.agents || []).length}</td>
                        </tr>
                    `).join("")}
                    ${state.nodes.length === 0 ? '<tr><td colspan="5" class="empty-state">No nodes</td></tr>' : ""}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderNodes() {
        return `
            <div class="card" style="padding:0;overflow:hidden">
                <table>
                    <thead><tr><th>ID</th><th>Tier</th><th>Arch</th><th>Status</th><th>Memory</th><th>CPUs</th><th>Agents</th><th>Labels</th></tr></thead>
                    <tbody>
                    ${state.nodes.map(n => `
                        <tr>
                            <td>${esc(n.id)}</td>
                            <td>${n.tier || "—"}</td>
                            <td>${esc(n.arch || "—")}</td>
                            <td>${statusBadge(n.status)}</td>
                            <td>${formatBytes(n.resources?.memory_total || 0)}</td>
                            <td>${n.resources?.cpu_count || "—"}</td>
                            <td>${(n.agents || []).length}</td>
                            <td>${Object.entries(n.labels || {}).map(([k,v]) => '<span class="cap-tag">' + esc(k) + '=' + esc(v) + '</span>').join(" ")}</td>
                        </tr>
                    `).join("")}
                    ${state.nodes.length === 0 ? '<tr><td colspan="8" class="empty-state">No nodes registered</td></tr>' : ""}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderAgents() {
        return `
            <div class="card" style="padding:0;overflow:hidden">
                <table>
                    <thead><tr><th>ID</th><th>Team</th><th>Status</th><th>Node</th><th>Memory</th><th>Restarts</th><th>Last Transition</th><th></th></tr></thead>
                    <tbody>
                    ${state.agents.map(a => `
                        <tr>
                            <td><a style="color:var(--accent);cursor:pointer;text-decoration:none" onclick="window.__selectAgent('${esc(a.id)}')">${esc(a.id)}</a></td>
                            <td>${esc(a.team)}</td>
                            <td>${statusBadge(a.status)}</td>
                            <td>${esc(a.node_id || "—")}</td>
                            <td>${formatBytes(a.memory_bytes || 0)}</td>
                            <td>${a.restart_count || 0}</td>
                            <td>${a.last_transition ? new Date(a.last_transition).toLocaleString() : "—"}</td>
                            <td><button class="btn" onclick="window.__selectAgent('${esc(a.id)}')">Detail</button></td>
                        </tr>
                    `).join("")}
                    ${state.agents.length === 0 ? '<tr><td colspan="8" class="empty-state">No agents</td></tr>' : ""}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderAgentDetail() {
        const a = state.agents.find(x => x.id === state.selectedAgent);
        if (!a) return '<div class="empty-state">Agent not found</div>';

        return `
            <div style="margin-bottom:1rem"><button class="btn" onclick="window.__navigate('agents')">Back to Agents</button></div>

            <div class="card" style="margin-bottom:1rem">
                <div class="section-title" style="margin-top:0">Details</div>
                <div class="detail-grid">
                    <div class="detail-label">ID</div><div class="detail-value">${esc(a.id)}</div>
                    <div class="detail-label">Team</div><div class="detail-value">${esc(a.team)}</div>
                    <div class="detail-label">Status</div><div class="detail-value">${statusBadge(a.status)}</div>
                    <div class="detail-label">Node</div><div class="detail-value">${esc(a.node_id || "—")}</div>
                    <div class="detail-label">VM PID</div><div class="detail-value">${a.vm_pid || "—"}</div>
                    <div class="detail-label">VM CID</div><div class="detail-value">${a.vm_cid || "—"}</div>
                    <div class="detail-label">Memory</div><div class="detail-value">${formatBytes(a.memory_bytes || 0)}</div>
                    <div class="detail-label">Restarts</div><div class="detail-value">${a.restart_count || 0}</div>
                    <div class="detail-label">Started</div><div class="detail-value">${a.started_at ? new Date(a.started_at).toLocaleString() : "—"}</div>
                    <div class="detail-label">Last Transition</div><div class="detail-value">${a.last_transition ? new Date(a.last_transition).toLocaleString() : "—"}</div>
                    ${a.error ? '<div class="detail-label">Error</div><div class="detail-value" style="color:var(--danger)">' + esc(a.error) + '</div>' : ""}
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="chat" onclick="window.__switchTab(this,'chat')">Chat</div>
                <div class="tab" data-tab="agent-logs" onclick="window.__switchTab(this,'agent-logs')">Logs</div>
            </div>

            <div id="tab-chat">
                <div class="card">
                    <div class="chat-container">
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input-row">
                            <input class="chat-input" id="chat-input" placeholder="Send a message..." onkeydown="if(event.key==='Enter')window.__sendChat()">
                            <button class="chat-send" onclick="window.__sendChat()">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-agent-logs" style="display:none">
                <div class="card">
                    <div class="log-container" id="agent-log-container">
                        <div class="log-line" style="color:var(--text-muted)">Loading logs...</div>
                    </div>
                </div>
            </div>
        `;
    }

    function setupChat() {
        const el = document.getElementById("chat-messages");
        if (!el) return;
        el.innerHTML = state.chatMessages.map(m => `
            <div class="chat-msg ${m.role}">
                <div class="bubble">${esc(m.text)}</div>
            </div>
        `).join("");
        el.scrollTop = el.scrollHeight;
    }

    function renderCapabilities() {
        const agents = state.capabilities.agents || {};
        const entries = Object.entries(agents);

        if (entries.length === 0) {
            return '<div class="empty-state">No capabilities registered</div>';
        }

        return `
            <div class="grid grid-3">
            ${entries.map(([agentID, info]) => `
                <div class="card">
                    <div style="font-weight:600;margin-bottom:0.25rem">${esc(agentID)}</div>
                    <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">
                        Team: ${esc(info.team_id || "—")} | Tier: ${esc(info.tier || "—")}
                    </div>
                    <div class="cap-list">
                        ${(info.capabilities || []).map(c => '<span class="cap-tag">' + esc(c.name) + '</span>').join("")}
                    </div>
                </div>
            `).join("")}
            </div>
        `;
    }

    function renderFlow() {
        if (state.agents.length === 0) {
            return '<div class="empty-state">No agents to visualize</div>';
        }
        return `
            <div class="card">
                <div class="flow-container" id="flow-container" style="height:400px">
                    <svg class="flow-svg" id="flow-svg"></svg>
                </div>
            </div>
            <div class="card" style="margin-top:1rem">
                <div class="card-title">Recent Messages</div>
                <div style="font-size:0.8rem;color:var(--text-muted)">
                    Message flow is visualized based on capability invocations between agents. Connections appear as agents communicate.
                </div>
            </div>
        `;
    }

    function drawFlow() {
        const container = document.getElementById("flow-container");
        if (!container) return;

        const agents = state.agents;
        const w = container.offsetWidth;
        const h = container.offsetHeight;

        // Layout agents in a circle
        const cx = w / 2, cy = h / 2;
        const radius = Math.min(w, h) * 0.35;

        agents.forEach((a, i) => {
            const angle = (2 * Math.PI * i) / agents.length - Math.PI / 2;
            const x = cx + radius * Math.cos(angle) - 60;
            const y = cy + radius * Math.sin(angle) - 20;

            const node = document.createElement("div");
            node.className = "flow-node";
            node.style.left = x + "px";
            node.style.top = y + "px";
            node.innerHTML = '<div class="name">' + esc(a.id) + '</div><div class="status">' + esc(a.status) + '</div>';
            container.appendChild(node);
        });
    }

    function renderLogs() {
        return `
            <div class="card" style="margin-bottom:1rem">
                <div style="display:flex;gap:0.5rem;align-items:center">
                    <select id="log-agent-select" style="padding:0.4rem;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius);font-size:0.875rem">
                        <option value="">All agents</option>
                        ${state.agents.map(a => '<option value="' + esc(a.id) + '">' + esc(a.id) + '</option>').join("")}
                    </select>
                    <button class="btn btn-primary" onclick="window.__loadLogs()">Load</button>
                </div>
            </div>
            <div class="card">
                <div class="log-container" id="log-container">
                    <div class="log-line" style="color:var(--text-muted)">Select an agent and click Load, or logs will stream live via WebSocket.</div>
                </div>
            </div>
        `;
    }

    function renderLogEntry(entry) {
        const container = document.getElementById("log-container") || document.getElementById("agent-log-container");
        if (!container) return;
        const line = document.createElement("div");
        line.className = "log-line";
        const allowedLevels = ["info", "warn", "error", "debug"];
        const rawLevel = (entry.level || "info").toLowerCase();
        const levelCls = allowedLevels.indexOf(rawLevel) !== -1 ? rawLevel : "info";
        line.innerHTML = '<span class="ts">' + new Date(entry.timestamp).toLocaleTimeString() + '</span> '
            + '<span class="level-' + levelCls + '">[' + esc((entry.level || "INFO").toUpperCase()) + ']</span> '
            + '<span>' + esc(entry.agent_id) + '</span> '
            + esc(entry.message);
        container.appendChild(line);
        container.scrollTop = container.scrollHeight;
    }

    function formatBytes(b) {
        if (!b) return "—";
        if (b >= 1073741824) return (b / 1073741824).toFixed(1) + " GiB";
        if (b >= 1048576) return (b / 1048576).toFixed(0) + " MiB";
        if (b >= 1024) return (b / 1024).toFixed(0) + " KiB";
        return b + " B";
    }

    // --- Navigation ---
    window.__selectAgent = function(id) {
        state.selectedAgent = id;
        state.chatMessages = [];
        state.view = "agent-detail";
        document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
        render();
    };

    window.__navigate = function(view) {
        state.view = view;
        document.querySelectorAll(".nav-item").forEach(el => {
            el.classList.toggle("active", el.dataset.view === view);
        });
        render();
    };

    window.__switchTab = function(el, tab) {
        el.parentElement.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tab-chat").style.display = tab === "chat" ? "" : "none";
        document.getElementById("tab-agent-logs").style.display = tab === "agent-logs" ? "" : "none";
        if (tab === "agent-logs") loadAgentLogs();
    };

    window.__sendChat = async function() {
        const input = document.getElementById("chat-input");
        const msg = input.value.trim();
        if (!msg) return;
        input.value = "";

        state.chatMessages.push({role: "user", text: msg});
        setupChat();

        try {
            const resp = await api.post("/agents/" + state.selectedAgent + "/chat", {message: msg});
            state.chatMessages.push({role: "agent", text: resp.response || resp.error || "No response"});
        } catch(e) {
            state.chatMessages.push({role: "agent", text: "Error: " + e.message});
        }
        setupChat();
    };

    window.__loadLogs = async function() {
        const sel = document.getElementById("log-agent-select");
        const agentID = sel.value;
        const container = document.getElementById("log-container");
        container.innerHTML = '<div class="log-line" style="color:var(--text-muted)">Loading...</div>';

        try {
            const path = agentID ? "/logs/" + agentID + "?limit=200" : "/logs/?limit=200";
            const entries = await api.get(path);
            container.innerHTML = "";
            (entries || []).forEach(e => renderLogEntry(e));
            if (!entries || entries.length === 0) {
                container.innerHTML = '<div class="log-line" style="color:var(--text-muted)">No log entries found.</div>';
            }
        } catch(e) {
            container.innerHTML = '<div class="log-line" style="color:var(--danger)">Error: ' + esc(e.message) + '</div>';
        }
    };

    async function loadAgentLogs() {
        const container = document.getElementById("agent-log-container");
        if (!container || !state.selectedAgent) return;
        container.innerHTML = '<div class="log-line" style="color:var(--text-muted)">Loading...</div>';
        try {
            const entries = await api.get("/logs/" + state.selectedAgent + "?limit=100");
            container.innerHTML = "";
            (entries || []).forEach(e => renderLogEntry(e));
            if (!entries || entries.length === 0) {
                container.innerHTML = '<div class="log-line" style="color:var(--text-muted)">No logs for this agent.</div>';
            }
        } catch(e) {
            container.innerHTML = '<div class="log-line" style="color:var(--danger)">Error: ' + esc(e.message) + '</div>';
        }
    }

    // --- Sidebar nav ---
    document.querySelectorAll(".nav-item").forEach(el => {
        el.addEventListener("click", () => {
            const view = el.dataset.view;
            if (!view) return;
            state.view = view;
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            el.classList.add("active");
            render();
        });
    });

    // --- Init ---
    refresh();
    connectWS();
    setInterval(refresh, 15000);
})();
</script>
</body>
</html>
