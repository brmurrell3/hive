apiVersion: hive/v1
kind: Agent
metadata:
  id: fact-checker
  team: content-pipeline
spec:
  tier: native
  runtime:
    type: custom
    command: "./entrypoint.sh"
  capabilities:
    - name: check-facts
      description: "Verify factual claims in content and flag potential inaccuracies."
      inputs:
        - name: content
          type: string
          description: "The content to fact-check"
      outputs:
        - name: claims_checked
          type: int
          description: "Number of factual claims checked"
        - name: issues_found
          type: int
          description: "Number of potential inaccuracies found"
        - name: report
          type: string
          description: "Detailed fact-check report"
        - name: verdict
          type: string
          description: "Overall verdict: pass, caution, or fail"
