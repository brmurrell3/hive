name: CI

on:
  push:
    branches: [main, phase-2-developer-experience]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Unit tests
        run: go test -tags unit -race -count=1 -coverprofile=unit.cov ./...

      - name: Integration tests
        run: go test -tags integration -race -count=1 -timeout 5m -coverprofile=integration.cov ./...

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "*.cov"

  test-vm:
    name: VM Tests (Mock)
    runs-on: ubuntu-latest
    # Note: Real KVM/Firecracker tests require a self-hosted runner with
    # /dev/kvm access. This job uses HIVE_TEST_FIRECRACKER=mock to exercise
    # VM-related code paths without actual hardware virtualization.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: VM tests (mock backend)
        run: go test -tags vm -race -count=1 -timeout 5m ./...
        env:
          HIVE_TEST_FIRECRACKER: mock

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: E2E tests
        run: go test -tags e2e -count=1 -timeout 3m -v ./test/e2e/
        env:
          HIVE_TEST_FIRECRACKER: mock

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}"
          go build -ldflags "${LDFLAGS}" -o /dev/null ./cmd/hived
          go build -ldflags "${LDFLAGS}" -o /dev/null ./cmd/hivectl
          go build -ldflags "${LDFLAGS}" -o /dev/null ./cmd/hive-agent
          go build -ldflags "${LDFLAGS}" -o /dev/null ./cmd/hive-sidecar

  audit-lint:
    name: Audit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Fuzz ParseMemory
        run: go test -tags unit -run=^$ -fuzz=^FuzzParseMemory$ -fuzztime=10s ./internal/config/

      - name: Fuzz ParseDiskSize
        run: go test -tags unit -run=^$ -fuzz=^FuzzParseDiskSize$ -fuzztime=10s ./internal/config/

      - name: Fuzz ValidateSubjectComponent
        run: go test -tags unit -run=^$ -fuzz=^FuzzValidateSubjectComponent$ -fuzztime=10s ./internal/types/

      - name: Fuzz EnvelopeValidate
        run: go test -tags unit -run=^$ -fuzz=^FuzzEnvelopeValidate$ -fuzztime=10s ./internal/types/

      - name: Fuzz Authenticate
        run: go test -tags unit -run=^$ -fuzz=^FuzzAuthenticate$ -fuzztime=10s ./internal/auth/

  race-stress:
    name: Race Stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Race detector stress test
        run: go test -tags unit,integration -race -count=5 -timeout 20m ./...

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Apache-2.0 headers on all .go files
        run: |
          MISSING=()
          while IFS= read -r -d '' file; do
            if ! head -1 "$file" | grep -q "SPDX-License-Identifier: Apache-2.0"; then
              MISSING+=("$file")
            fi
          done < <(find . -name '*.go' -not -path './vendor/*' -print0)
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "::error::The following .go files are missing the Apache-2.0 SPDX license header:"
            printf '  %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All .go files have Apache-2.0 license headers."

  mod-tidy:
    name: Module Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit the changes."
            exit 1
          fi
